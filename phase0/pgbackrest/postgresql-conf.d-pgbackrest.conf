# Phase 0 Safety Spine — PITR archiving via pgBackRest. Owner: Jack. 2026-07-05.
# Deployed to konnex-data at /etc/postgresql/16/main/conf.d/pgbackrest.conf (include_dir='conf.d' already enabled).
# archive_mode requires a server RESTART to take effect (postmaster context).
# archive_command is reload-applicable. wal_level=replica default is sufficient for PITR.
archive_mode = on
archive_command = 'pgbackrest --stanza=market_intelligence archive-push %p'
