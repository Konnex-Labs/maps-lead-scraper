# pgBackRest config — Phase 0 Safety Spine (PITR). Owner: Jack.
# Deployed to konnex-data (prod DB box, 204.168.198.203) at /etc/pgbackrest/pgbackrest.conf.
# First cut: LOCAL same-disk repo (Matt Q2 decision 2026-07-05). Off-box repo = Phase 0.x DR fast-follow.
[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
repo1-retention-diff=4
process-max=2
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest
start-fast=y

[global:archive-push]
compress-level=3

[market_intelligence]
pg1-path=/var/lib/postgresql/16/main
pg1-port=5432
pg1-user=postgres
