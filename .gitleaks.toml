description = "Keygen public account ID and Chrome profile test artifacts (committed to v3.0.0, since gitignored)"
regexes = ['''441053a9-f19b-48e3-8d8d-502a96974848''']
regexTarget = "secret"
paths = ['''tests/playwright/\.carousel-chrome-profile/''']
